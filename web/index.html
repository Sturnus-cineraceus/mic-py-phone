<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>マイク・パイ・フォン — 文字起こしツール</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="site-brand">
      <h1>マイク・パイ・フォン</h1>
      <p class="site-subtitle">文字起こしツール</p>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>マイクを選択して録音・文字起こしを開始</h2>
      <div class="device-selects">
        <label class="device-label">マイク（入力）: <select class="device-select primary-select" id="inputSelect"></select></label>
        <label class="device-label">スピーカー（出力）: <select class="device-select primary-select" id="outputSelect"></select></label>
      </div>

      <!-- 自動取得に移行したためボタンを削除しました -->
      <div style="margin-top:12px; display:flex; align-items:center; gap:12px">
        <button id="startBtn" class="icon-btn" title="バイパスを開始" aria-label="バイパスを開始">
          <span class="material-icons" aria-hidden="true">play_arrow</span>
        </button>
        <button id="stopBtn" class="icon-btn" title="バイパスを停止" aria-label="バイパスを停止" disabled>
          <span class="material-icons" aria-hidden="true">stop</span>
        </button>
        <div id="bypassStatus" class="message" style="display:inline-block; margin-left:12px">ステータス: 停止中</div>
      </div>

      <div style="margin-top:12px; border-top:1px dashed #ddd; padding-top:8px; display:flex; align-items:center; gap:12px;">
        <button id="recBtn" class="icon-btn" title="録音を開始" aria-label="録音を開始">
          <span class="material-icons" aria-hidden="true">mic</span>
        </button>
        <button id="recStopBtn" class="icon-btn" title="録音を停止" aria-label="録音を停止" disabled>
          <span class="material-icons" aria-hidden="true">stop</span>
        </button>
        <div id="recordStatus" class="message" style="display:inline-block; margin-left:12px">録音: 停止中</div>
      </div>

      <div style="margin-top:10px;">
        <div style="font-size:0.9em; margin-bottom:6px">レベルメーター</div>
        <div style="display:flex; gap:12px; align-items:center;">
          <div style="flex:1">
            <div style="font-size:0.8em">入力（マイク）</div>
            <div style="background:#eee; height:10px; border-radius:4px; overflow:hidden;">
              <div id="inputLevelBar" style="height:100%; width:0%; background:#4caf50"></div>
            </div>
          </div>
          <div style="flex:1">
            <div style="font-size:0.8em">出力（処理後）</div>
            <div style="background:#eee; height:10px; border-radius:4px; overflow:hidden;">
              <div id="outputLevelBar" style="height:100%; width:0%; background:#2196f3"></div>
            </div>
          </div>
        </div>
      </div>

      <div style="margin-top:12px; border-top:1px solid #eee; padding-top:8px; display:flex; gap:8px; align-items:center">
        <button id="saveBtn" class="icon-btn" title="設定を保存" aria-label="設定を保存">
          <span class="material-icons" aria-hidden="true">save</span>
        </button>
        <button id="loadBtn" class="icon-btn" title="設定を読み込む" aria-label="設定を読み込む">
          <span class="material-icons" aria-hidden="true">folder_open</span>
        </button>
        <button id="resetBtn" class="icon-btn" title="デフォルトに戻す" aria-label="デフォルトに戻す">
          <span class="material-icons" aria-hidden="true">restore</span>
        </button>
      </div>

      <div style="margin-top:12px; display:flex; align-items:center; gap:12px;">
        <label style="display:inline-flex; align-items:center; gap:8px"><input type="checkbox" id="transcribeEnabled"> 文字起こし ON</label>
        <div id="transcribeStatus" class="message" style="display:inline-block; margin-left:12px">文字起こし: OFF</div>
      </div>

      <!-- 詳細設定（アコーディオン）: 下部に移動 -->
      <div class="accordion" style="margin-top:16px">
        <button id="audioToggle" class="accordion-header" aria-expanded="false" aria-controls="audioControls">音声コンソール ▸</button>
        <div id="audioControls" class="accordion-panel" hidden>
        <label style="display:block; margin-top:8px">ゲイン: <span id="gainVal">0 dB</span></label>
        <input id="gainRange" type="range" min="-30" max="30" step="0.5" value="0" style="width:100%">
        <div style="margin-top:8px">
          <label style="display:inline-block; margin-right:8px"><input type="checkbox" id="gateEnabled"> ノイズカット(ゲート) ON</label>
          <div style="margin-top:6px">
            <label style="display:block; margin-bottom:4px">強さ: <span id="gateVal">中(50%)</span></label>
            <input id="gateRange" type="range" min="0" max="100" step="1" value="50" style="width:100%">
          </div>
        </div>
        <div style="margin-top:10px; border-top:1px solid #eee; padding-top:8px">
          <label style="display:inline-block; margin-right:8px"><input type="checkbox" id="hpfEnabled"> 低音ノイズカット ON</label>
          <label style="display:inline-block; margin-left:12px"><input type="checkbox" id="nrEnabled"> ノイズリダクション ON</label>
          <div style="margin-top:6px">
            <label style="display:block; margin-bottom:4px">ノイズリダクション強さ: <span id="nrStrengthVal">中(50%)</span></label>
            <input id="nrStrength" type="range" min="0" max="100" step="1" value="50" style="width:100%">
          </div>
          <div style="margin-top:6px">
            <label style="display:block; margin-bottom:4px">低音ノイズカット強さ: <span id="hpfVal">中(50%)</span></label>
            <input id="hpfCutoff" type="range" min="0" max="100" step="1" value="50" style="width:100%">
          </div>
        </div>
        <div style="margin-top:10px; border-top:1px solid #eee; padding-top:8px">
          <label style="display:inline-block; margin-right:8px"><input type="checkbox" id="compEnabled"> 声の聞き取り補正(コンプレッサー) ON</label>
          <div style="margin-top:6px">
            <label style="display:block; margin-bottom:4px">補正強さ: <span id="compRatioVal">中(50%)</span></label>
            <input id="compRatio" type="range" min="0" max="100" step="1" value="50" style="width:100%">
          </div>
        </div>
        <div style="margin-top:10px; border-top:1px solid #eee; padding-top:8px">
          <label style="display:inline-block; margin-right:8px"><input type="checkbox" id="dehissEnabled"> 最終ノイズ調整 ON</label>
          <div style="margin-top:6px">
            <label style="display:block; margin-bottom:4px">最終ノイズ調整の強さ: <span id="dehissVal">中(50%)</span></label>
            <input id="dehissStrength" type="range" min="0" max="100" step="1" value="50" style="width:100%">
          </div>
        </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Toast notifications (ARIA live region) -->
  <div id="toastArea" class="toast-area" aria-live="polite" aria-atomic="true"></div>

  <script src="js/utils.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/devices.js"></script>
  <script src="js/ui/accordion.js"></script>
  <script src="js/controls/gain.js"></script>
  <script src="js/controls/gate.js"></script>
  <script src="js/controls/hpf.js"></script>
  <script src="js/controls/nr.js"></script>
  <script src="js/controls/compressor.js"></script>
  <script src="js/controls/final_noise.js"></script>
  <script src="js/levels.js"></script>
  <script src="js/recording.js"></script>
  <script src="js/bypass.js"></script>
  <script src="js/settings.js"></script>
  <script src="script.js"></script>
</body>
</html>
