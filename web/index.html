<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>pymic - Audio Bypass</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <h1>pymic — Audio Bypass</h1>
  </header>

  <main class="container">
    <section class="card">
      <h2>オーディオデバイスを選択してバイパス開始</h2>
      <p>選択した入力デバイスの音声を直接選択した出力デバイスへルーティングします。</p>

      <!-- 自動取得に移行したためボタンを削除しました -->
      <div id="audioControls" style="margin-top:12px">
        <label style="display:block; margin-bottom:6px">マイク（入力）: <select id="inputSelect"></select></label>
        <label style="display:block; margin-bottom:6px">スピーカー（出力）: <select id="outputSelect"></select></label>
      </div>
      <div style="margin-top:12px">
        <button id="startBtn">開始</button>
        <button id="stopBtn" disabled>停止</button>
      </div>

      <div id="status" class="message" style="margin-top:8px">状態: 停止</div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
