<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>pymic - Audio Bypass</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <h1>pymic — Audio Bypass</h1>
  </header>

  <main class="container">
    <section class="card">
      <h2>オーディオデバイスを選択してバイパス開始</h2>
      <p>選択した入力デバイスの音声を直接選択した出力デバイスへルーティングします。</p>

      <!-- 自動取得に移行したためボタンを削除しました -->
      <div id="audioControls" style="margin-top:12px">
        <label style="display:block; margin-bottom:6px">マイク（入力）: <select id="inputSelect"></select></label>
        <label style="display:block; margin-bottom:6px">スピーカー（出力）: <select id="outputSelect"></select></label>
        <label style="display:block; margin-top:8px">ゲイン: <span id="gainVal">0 dB</span></label>
        <input id="gainRange" type="range" min="-30" max="30" step="0.5" value="0" style="width:100%">
        <div style="margin-top:8px">
          <label style="display:inline-block; margin-right:8px"><input type="checkbox" id="gateEnabled"> ノイズゲートを有効にする</label>
          <div style="margin-top:6px">
            <label style="display:block; margin-bottom:4px">閾値: <span id="gateVal">-40 dB</span></label>
            <input id="gateRange" type="range" min="-80" max="-10" step="0.5" value="-40" style="width:100%">
          </div>
          <div style="margin-top:6px; font-size:0.9em; color:#666">アタック/リリース(ms): <input id="gateAttack" type="number" value="10" style="width:70px"> / <input id="gateRelease" type="number" value="100" style="width:70px"></div>
        </div>
        <div style="margin-top:10px; border-top:1px solid #eee; padding-top:8px">
          <label style="display:inline-block; margin-right:8px"><input type="checkbox" id="hpfEnabled"> ハイパスフィルタを有効にする</label>
          <div style="margin-top:6px">
            <label style="display:block; margin-bottom:4px">カットオフ: <span id="hpfVal">80 Hz</span></label>
            <input id="hpfCutoff" type="range" min="20" max="2000" step="1" value="80" style="width:100%">
          </div>
        </div>
      </div>
      <div style="margin-top:12px">
        <button id="startBtn">開始</button>
        <button id="stopBtn" disabled>停止</button>
      </div>

      <div id="status" class="message" style="margin-top:8px">状態: 停止</div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
