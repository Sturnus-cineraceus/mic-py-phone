<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>pywebview Demo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <h1>pywebview デモ表示</h1>
    <button id="themeBtn">ダーク切替</button>
  </header>

  <main class="container">
    <section class="card">
      <h2>見た目の実証</h2>
      <p>これは簡単な HTML/CSS デモです。スタイルやレイアウトをここで試せます。</p>

      <div class="controls">
        <label>数値: <input id="value" type="number" value="5"/></label>
        <label>操作:
          <select id="op">
            <option value="square">2乗</option>
            <option value="factorial">階乗</option>
          </select>
        </label>
        <button id="calcBtn">計算実行</button>
        <button id="sysBtn">システム情報取得</button>
      </div>

      <div id="result" class="message"></div>
      <div id="sysinfo" class="message" style="margin-top:8px"></div>

      <div style="margin-top:12px">
        <button id="audioBtn">オーディオデバイス一覧取得</button>
      </div>
      <div id="audioControls" style="margin-top:12px">
        <label style="display:block; margin-bottom:6px">マイク（入力）: <select id="inputSelect"></select></label>
        <label style="display:block; margin-bottom:6px">スピーカー（出力）: <select id="outputSelect"></select></label>
      </div>
      <div id="audiolist" class="message" style="margin-top:8px"></div>

      <div style="margin-top:12px">
        <button onclick="showMessage()">挨拶を表示</button>
      </div>
      <div id="message" class="message"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
